name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read


jobs:
  verify:
    name: Verify and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Credential-free verification
        run: npm run verify
